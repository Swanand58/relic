name: Bug report
description: Something in relic is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        detail as possible — it makes triage and reproduction far faster.

  - type: input
    id: version
    attributes:
      label: relic version
      description: Output of `relic --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version` or `uv run python --version`.
      placeholder: "3.12.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include the command you ran.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal repro. If possible, link to a small repo or paste a `relic.yaml`.
      placeholder: |
        1. `relic init`
        2. `relic index`
        3. `relic query path/that/breaks.py`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant CLI output. Use code fences.
      render: shell
