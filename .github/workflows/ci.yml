name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check relic tests
      - name: Ruff format --check
        run: uv run ruff format --check relic tests

  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install (${{ matrix.python-version }})
        run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Pytest
        run: uv run pytest

  release-guard:
    name: release guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check CHANGELOG updated when version bumped
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          VERSION_CHANGED=$(git diff "$BASE" "$HEAD" -- pyproject.toml \
            | grep '^+version' | grep -v '^+++' || true)

          if [ -z "$VERSION_CHANGED" ]; then
            echo "version unchanged — no CHANGELOG requirement"
            exit 0
          fi

          echo "version bumped: $VERSION_CHANGED"

          CHANGELOG_CHANGED=$(git diff "$BASE" "$HEAD" -- CHANGELOG.md || true)
          if [ -z "$CHANGELOG_CHANGED" ]; then
            echo "::error file=CHANGELOG.md::Version was bumped in pyproject.toml but CHANGELOG.md was not updated. Add an entry under [Unreleased] before releasing."
            exit 1
          fi

          echo "CHANGELOG updated — OK"

  smoke:
    name: smoke (e2e CLI)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install
        run: uv sync
      - name: Pin relic.yaml (dogfood on relic itself)
        run: |
          cat > relic.yaml <<'EOF'
          subprojects:
            relic:
              path: ./relic
              description: ""
          EOF
      - name: relic --version
        run: uv run relic --version
      - name: relic index
        run: uv run relic index
      - name: relic stats
        run: uv run relic stats
      - name: relic search
        run: uv run relic search compute_audit
      - name: relic query (file)
        run: uv run relic query relic/audit.py
      - name: relic query (symbol)
        run: uv run relic query compute_audit
      - name: relic coverage
        run: uv run relic coverage
      - name: relic audit
        run: uv run relic audit
      - name: relic benchmark
        run: uv run relic benchmark relic/audit.py
      - name: relic centrality
        run: uv run relic centrality --top 5
      - name: relic cycles
        run: uv run relic cycles
      - name: relic impact
        run: uv run relic impact relic/audit.py
      - name: relic diff
        run: uv run relic diff
      - name: relic viz (save to file)
        run: uv run relic viz --out /tmp/relic_viz.html
